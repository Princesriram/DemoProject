<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<!-- IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Will You Marry Me?</title>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:#ffdde1;
overflow:hidden;
padding:20px;
}

/* card */

.container{
text-align:center;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
z-index:2;
max-width:95%;
}

/* heading */

h1{
color:#e6005c;
font-size:clamp(26px,6vw,38px);
}

/* typing text */

#message{
font-size:clamp(16px,4vw,20px);
margin-bottom:15px;
color:#444;
min-height:30px;
}

/* buttons */

button{
padding:14px 28px;
font-size:18px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
min-width:110px;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:gray;
color:white;
position:relative;
}

/* ring */

#ring{
font-size:60px;
display:none;
animation:pop 1s ease forwards;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1.5);}
}

/* floating hearts */

.heart{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* petals */

.petal{
position:absolute;
font-size:20px;
animation:fall 7s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(100vh) rotate(360deg);}
}

/* fireworks */

.firework{
position:absolute;
font-size:34px;
animation:boom 1.5s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(3);opacity:0;}
}

/* heart rain */

.rainHeart{
position:absolute;
font-size:26px;
animation:rain 3s linear infinite;
}

@keyframes rain{
0%{transform:translateY(-10vh);}
100%{transform:translateY(100vh);}
}

/* timeline */

#timeline{
display:none;
text-align:center;
margin-top:20px;
font-size:clamp(14px,4vw,18px);
}

/* final screen */

#finalScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffdde1;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:clamp(26px,7vw,40px);
color:#e6005c;
text-align:center;
z-index:10;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Bangu Will You Marry Me? ❤️</h1>

<div id="message"></div>

<div id="ring">💍</div>

<button id="yes" onclick="yesClicked()">Yes</button>
<button id="no" onclick="moveNo()">No</button>

<div id="finalMessage" style="font-size:20px;color:#e6005c;margin-top:10px;"></div>

</div>

<div id="timeline">

<h2 style="color:#e6005c;">❤️ Our Love Story ❤️</h2>

<div>💫 The Day We Met — 21 Jan 2023</div>
<div>😊 First Meet — Chennai near Aadhithi PG</div>
<div>🌿 First Outing — Vandaloor Zoo</div>
<div>💍 First Proposal — 21 Dec 2025</div>

</div>

<div id="finalScreen">

<div>
Sriram ❤️ Bhavya <br>
Forever 💍
</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8e0a6f4b7.mp3">
</audio>

<script>

/* typing message */

const text="From the moment I met you, my life changed ❤️";
let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,60);
}
}

typeWriter();

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,500);

/* petals */

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌹";
petal.style.left=Math.random()*100+"vw";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),7000);

}

setInterval(createPetal,800);

/* fireworks */

function createFirework(){

const fire=document.createElement("div");

fire.className="firework";
fire.innerHTML="✨";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1500);

}

/* heart rain */

function createHeartRain(){

const heart=document.createElement("div");

heart.className="rainHeart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),3000);

}

/* YES click */

function yesClicked(){

document.getElementById("ring").style.display="block";
document.getElementById("music").play();

document.getElementById("yes").disabled=true;
document.getElementById("yes").innerHTML="❤️ Accepted ❤️";

document.getElementById("no").style.display="none";

document.getElementById("finalMessage").innerHTML="💖 Our forever starts today ❤️";

document.getElementById("timeline").style.display="block";

for(let j=0;j<15;j++){
setTimeout(createFirework,j*120);
}

setInterval(createHeartRain,300);

setTimeout(()=>{
document.getElementById("finalScreen").style.display="flex";
},5000);

}

/* NO escape */

function moveNo(){

const btn=document.getElementById("no");

const x=Math.random()*(window.innerWidth-btn.offsetWidth);
const y=Math.random()*(window.innerHeight-btn.offsetHeight);

btn.style.position="absolute";
btn.style.left=x+"px";
btn.style.top=y+"px";

}

</script>

</body>
</html>
